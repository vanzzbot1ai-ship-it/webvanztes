<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ✨</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffe4e1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.8);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            backdrop-filter: blur(5px);
            border: 2px solid #ffb6c1;
            max-width: 400px;
            z-index: 1;
        }

        h1 {
            color: #ff69b4;
            font-size: 24px;
            margin-bottom: 20px;
        }

        .gif-container img {
            width: 150px;
            margin-bottom: 20px;
            border-radius: 10px;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            position: relative;
        }

        button {
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s;
            font-weight: bold;
        }

        #btnSuka {
            background-color: #ff69b4;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 105, 180, 0.4);
        }

        #btnSuka:hover {
            transform: scale(1.1);
        }

        #btnGa {
            background-color: #f0f0f0;
            color: #888;
            position: absolute;
            left: 140px;
        }

        /* Animasi Hati Tersebar */
        .heart {
            position: fixed;
            top: -10px;
            font-size: 20px;
            user-select: none;
            z-index: 0;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(105vh) rotate(360deg);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="gif-container">
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpueGZ3eXF6NHR4eXF4eHh4eHh4eHh4eHh4eHh4eHh4eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/T86cltIqXQ8N655NnB/giphy.gif" alt="Cute Cat">
        </div>
        <h1>Happy Birthday! 🎂<br>Kamu suka aku gaa? 🥺</h1>
        
        <div class="btn-group">
            <button id="btnSuka" onclick="tampilkanPesan()">Suka!</button>
            <button id="btnGa" onmouseover="pindahTombol()" onclick="pindahTombol()">Ga Suka</button>
        </div>
    </div>

    <script>
        function pindahTombol() {
            const btn = document.getElementById('btnGa');
            
            // Hitung posisi acak di layar
            const x = Math.random() * (window.innerWidth - btn.offsetWidth);
            const y = Math.random() * (window.innerHeight - btn.offsetHeight);
            
            btn.style.position = 'fixed';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        function tampilkanPesan() {
            // Hapus isi container
            const container = document.querySelector('.container');
            container.innerHTML = `
                <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHpueGZ3eXF6NHR4eXF4eHh4eHh4eHh4eHh4eHh4eHh4eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/KztT2c4u8mYYUiCiS0/giphy.gif" width="150">
                <h1 style="color: #ff69b4;">Yeayyy! I Love You Too! ❤️✨</h1>
                <p>Makasih ya udah pilih suka, hehehe.</p>
            `;

            // Jalankan efek hujan hati
            setInterval(createHeart, 300);
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 2 + 3 + 's';
            heart.style.opacity = Math.random();
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 5000);
        }
    </script>
</body>
</html>
